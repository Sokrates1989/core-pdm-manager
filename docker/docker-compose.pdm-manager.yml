name: core-pdm-manager

services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13-slim}
        USER_ID: ${PDM_MANAGER_UID:-1000}
        GROUP_ID: ${PDM_MANAGER_GID:-1000}
    image: core-pdm-manager:latest
    volumes:
      - "${PDM_MANAGER_PROJECT_ROOT}:/workspace"
    working_dir: /workspace
    tty: true
    stdin_open: true
    # Default command only applies to the bare interactive shell (`run --rm dev`).
    # Explicit commands like `run --rm dev pdm install` or the dev-setup.sh
    # invocation override this and are unaffected. `stty icrnl -igncr`
    # normalizes carriage returns from Windows PowerShell before bash reads
    # commands, preventing arguments like `init\r` from reaching PDM.
    command: ["/bin/bash", "-c", "stty icrnl -igncr 2>/dev/null || true; exec /bin/bash -i"]
    environment:
      - USE_UV_BACKEND=${USE_UV_BACKEND:-true}
      - PDM_INSTALL_CACHE=${PDM_INSTALL_CACHE:-true}
      - PDM_PARALLEL_INSTALL=${PDM_PARALLEL_INSTALL:-true}
      - PIPX_HOME=/home/devuser/.local/pipx
      - PIPX_BIN_DIR=/home/devuser/.local/bin
